/* ===== 3D ISOMETRIC SETUP ===== */
body {
  margin: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Arial, sans-serif;
}

.scene {
  perspective: 800px;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.isometric {
  transform: rotateX(55deg) rotateZ(-45deg) translateY(-20px);
  transform-style: preserve-3d;
}

/* ===== PIXEL GRID SYSTEM ===== */
.pixel-grid {
  display: grid;
  gap: 2px;
  transform-style: preserve-3d;
}

.pixel {
  width: 14px;
  height: 14px;
  border-radius: 2px;
  box-shadow: inset 0 0 2px rgba(255,255,255,0.1);
  transition: transform 0.3s ease;
}

.pixel:hover {
  transform: scale(1.3);
  z-index: 10;
}

/* ===== MR. BEAN - 32x40 PIXEL ART ===== */
.mrbean-container {
  position: relative;
  transform-style: preserve-3d;
  animation: float 3s ease-in-out infinite;
}

.mrbean-container .pixel-grid {
  grid-template-columns: repeat(32, 14px);
  grid-template-rows: repeat(40, 14px);
}

/* ===== TEDDY BEAR - 24x28 PIXEL ART ===== */
.teddy-container {
  position: relative;
  transform-style: preserve-3d;
  margin-left: 20px;
  animation: float 3s ease-in-out 1.5s infinite;
}

.teddy-container .pixel-grid {
  grid-template-columns: repeat(24, 12px);
  grid-template-rows: repeat(28, 12px);
}

/* ===== 3D EFFECT ===== */
.entity-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 40px;
  transform-style: preserve-3d;
  padding: 40px;
  background: rgba(0,0,0,0.3);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* ===== SHADOW ===== */
.shadow {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 20px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(10px);
  z-index: -1;
}

/* ===== ANIMATIONS ===== */
@keyframes float {
  0%, 100% { transform: translateY(0px) rotateX(0deg); }
  50% { transform: translateY(-15px) rotateX(2deg); }
}

@keyframes wave {
  0%, 100% { transform: rotateZ(0deg); }
  50% { transform: rotateZ(5deg); }
}

@keyframes cameraMove {
  0% { transform: rotateX(55deg) rotateZ(-45deg) translateY(-20px) scale(1); }
  50% { transform: rotateX(55deg) rotateZ(-45deg) translateY(-30px) scale(1.05); }
  100% { transform: rotateX(55deg) rotateZ(-45deg) translateY(-20px) scale(1); }
}

.isometric {
  animation: cameraMove 8s ease-in-out infinite;
}

/* ===== MR. BEAN PIXEL DATA (32x40) ===== */
/* Row 1-3: Hair (brown) */
.mrbean .r1 { background: #4a2810; }
.mrbean .r2 { background: #5c3218; }
.mrbean .r3 { background: #3d200c; }

/* Row 4-8: Face (skin tone) */

.mrbean .skin-dark { background: #e8c0a8; }
.mrbean .eye-white { background: #ffffff; }
.mrbean .pupil { background: #1a1a1a; }
.mrbean .eyebrow { background: #3d200c; }

/* Row 9-12: Mouth area */

.mrbean .mouth-inner { background: #8b1a1a; }

/* Row 13-18: Jacket (dark brown/tweed) */

/* Row 25-28: Shoes */

<script>
// Add some interactive hover effects
document.querySelectorAll('.pixel').forEach(pixel => {
  pixel.addEventListener('mouseenter', function() {
    this.style.transform = 'scale(1.5)';
    this.style.zIndex = '100';
    this.style.boxShadow = '0 0 20px rgba(255,255,255,0.5)';
  });
  pixel.addEventListener('mouseleave', function() {
    this.style.transform = 'scale(1)';
    this.style.zIndex = '1';
    this.style.boxShadow = 'inset 0 0 2px rgba(255,255,255,0.1)';
  });
});

// Click to make Mr. Bean wave
document.querySelector('.mrbean-container').addEventListener('click', function() {
  this.style.animation = 'none';
  setTimeout(() => {
    this.style.animation = 'wave 0.5s ease-in-out 3';
  }, 10);
  setTimeout(() => {
    this.style.animation = 'float 3s ease-in-out infinite';
  }, 1600);
});
</script>
